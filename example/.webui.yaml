server:
  port: 3110
  index: README.md

browser:
  application: firefox
  autostart: true

content:
  - name: "help"
    path: help/
    content: markdown
    serve_images: false
    index: index.md
    ignore:
      - "*.jpg"
      - "*.jpeg"
      - "*.gif"
      - "*.png"
      - "*.svg"
    menu: "Help"

data:
  - name: "contacts"
    path: data/contacts.csv
    schema: schema/contacts.yml
    record_template: templates/contacts_record.html
    menu: "Data / Contacts"

  - name: "projects"
    path: data/projects.csv
    schema: schema/projects.yml
    record_template: templates/projects_record.html
    menu: "Data / Projects"

  - name: "inventory"
    path: data/inventory.csv
    schema: schema/inventory.yml
    menu: "Data / Inventory"
