{{define "title"}}{{.Title}} — webui{{end}}

{{define "content"}}
<div class="d-flex align-items-center justify-content-between mb-3">
  <h1 class="h3 mb-0">{{.Title}}</h1>
  <a href="?action=new" class="btn btn-primary btn-sm">+ New</a>
</div>
<div class="card shadow-sm">
  <div class="table-responsive">
    <table class="table table-hover table-striped mb-0">
      <thead class="table-dark">
        <tr>
          {{range .Headers}}<th scope="col">{{.}}</th>{{end}}
          <th scope="col"></th>
        </tr>
      </thead>
      <tbody>
        {{range .Rows}}
        <tr>
          {{range .Cells}}<td>{{.}}</td>{{end}}
          <td class="text-end text-nowrap">
            <a href="?action=edit&row={{.Idx}}" class="btn btn-outline-secondary btn-sm">Edit</a>
            <button class="btn btn-outline-danger btn-sm ms-1" data-confirm="Delete this row?">Delete</button>
          </td>
        </tr>
        {{else}}
        <tr><td colspan="100" class="text-center text-muted py-4">No records</td></tr>
        {{end}}
      </tbody>
    </table>
  </div>
</div>
{{end}}
