name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          EXT=""
          [ "$GOOS" = "windows" ] && EXT=".exe"
          BINARY="webui-${{ github.ref_name }}-${GOOS}-${GOARCH}${EXT}"
          go build \
            -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o "dist/${BINARY}" \
            ./cmd/webui
          echo "BINARY=dist/${BINARY}" >> "$GITHUB_ENV"

      - name: Checksum
        run: sha256sum "$BINARY" > "${BINARY}.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: webui-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**
          generate_release_notes: true
